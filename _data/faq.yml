- category: "Geral"
  slug: "geral"
  items:
    - q: "O que é homeopatia, resumidamente?"
      a: "É um sistema terapêutico que usa medicamentos altamente diluídos, escolhidos de forma individualizada, para estimular a capacidade natural de reação do organismo."
    - q: "O que são florais de Bach, resumidamente?"
      a: "São 38 essências florais voltadas ao apoio de estados emocionais, como medo, insegurança ou exaustão, escolhidas a partir de uma escuta individual."
    - q: "Homeopatia e florais de Bach são a mesma coisa?"
      a: "Não. São sistemas terapêuticos diferentes, com históricos e formas de preparo distintas, embora possam ser usados de forma complementar."
    - q: "Homeopatia dói? O medicamento é injetável?"
      a: "Não. Os medicamentos homeopáticos são administrados por via oral, geralmente em glóbulos, gotas ou grânulos. Não há injeções nem procedimentos invasivos."
    - q: "Homeopatia é considerada uma prática reconhecida no Brasil?"
      a: "Sim, é reconhecida como especialidade médica pelo Conselho Federal de Medicina desde 1980, além de ser praticada por profissionais de outras formações em terapias complementares."
    - q: "Homeopatia e florais de Bach têm comprovação científica?"
      a: "Há estudos e relatos clínicos favoráveis e desfavoráveis, e o tema é debatido tanto na comunidade científica quanto na comunidade homeopática. Este site apresenta a abordagem de forma educativa, sem fazer afirmações de eficácia para doenças específicas."
    - q: "Existe reação inicial ao começar o tratamento?"
      a: "Algumas pessoas relatam uma sensação passageira de intensificação de sintomas no início do tratamento; outras não notam nada diferente. Isso é acompanhado de perto nas consultas."
    - q: "Posso interromper o tratamento quando quiser?"
      a: "Sim, o acompanhamento é sempre voluntário. O ideal é conversar antes de interromper, para entender o momento do tratamento e orientar a melhor forma de encerrar."

- category: "Homeopatia"
  slug: "homeopatia"
  items:
    - q: "Como é escolhido o medicamento homeopático?"
      a: "A partir de uma anamnese detalhada, seguida de repertorização e estudo da matéria médica, buscando o medicamento cujo perfil de sintomas mais se assemelha ao quadro da pessoa."
    - q: "Por que a consulta de homeopatia é tão longa?"
      a: "Porque a individualização depende de conhecer detalhes físicos, emocionais e de rotina que, juntos, formam o retrato único de cada pessoa — e isso exige tempo de escuta."
    - q: "Quantos medicamentos homeopáticos eu vou tomar ao mesmo tempo?"
      a: "Na linha hahnemanniana clássica, geralmente um único medicamento por vez, para se observar com clareza a resposta do organismo."
    - q: "Homeopatia pode ser usada junto com remédios de uso contínuo?"
      a: "Na maioria dos casos sim, como complemento. Nenhum medicamento prescrito por médico deve ser interrompido sem orientação dele; esse ponto é sempre conversado na consulta."
    - q: "Homeopatia tem contraindicação?"
      a: "É considerada, de forma geral, de baixo risco. Ainda assim, cada caso é avaliado individualmente, especialmente em situações de saúde específicas."
    - q: "O que é uma potência homeopática?"
      a: "É o grau de diluição e dinamização de um medicamento homeopático, escolhido pelo terapeuta conforme o momento e a sensibilidade da pessoa."
    - q: "Onde comprar o medicamento homeopático indicado?"
      a: "Em farmácias de manipulação homeopática. As orientações de onde adquirir são enviadas junto com a receita, após a consulta."
    - q: "Homeopatia serve apenas para questões emocionais?"
      a: "Não. É utilizada tanto para queixas físicas quanto emocionais, sempre olhando a pessoa como um todo, e não apenas um sintoma isolado."

- category: "Florais de Bach"
  slug: "florais"
  items:
    - q: "Os florais de Bach têm contraindicação?"
      a: "De forma geral, são considerados de baixo risco por não conterem substâncias de ação farmacológica direta conhecida. O preparo comercial padrão contém conservante à base de álcool, o que pode ser ajustado conforme o caso."
    - q: "Os florais de Bach viciam ou causam dependência?"
      a: "Não há relação conhecida de dependência associada ao uso dos florais de Bach."
    - q: "Quantos florais entram em uma fórmula?"
      a: "Geralmente entre 4 e 7 florais, escolhidos a partir da conversa sobre os estados emocionais vividos no momento."
    - q: "Posso escolher meus próprios florais sem terapeuta?"
      a: "É possível, mas a escolha costuma ser menos precisa, já que exige investigar camadas emocionais que nem sempre são óbvias à primeira vista, mesmo para quem está vivendo a situação."
    - q: "Os florais têm gosto ou cheiro forte?"
      a: "O preparo padrão contém conservante à base de conhaque, com sabor levemente adocicado e leve presença de álcool; versões sem álcool podem ser preparadas quando necessário."
    - q: "Com que frequência tomo os florais de Bach?"
      a: "Normalmente algumas gotas, diversas vezes ao dia, conforme orientação enviada após a consulta."
    - q: "Florais de Bach substituem terapia psicológica?"
      a: "Não. São uma abordagem complementar de apoio emocional e não substituem acompanhamento psicológico ou psiquiátrico quando este for necessário."

- category: "Crianças, gestantes e segurança"
  slug: "seguranca"
  items:
    - q: "Crianças podem fazer homeopatia?"
      a: "Sim. A consulta é adaptada à linguagem e à rotina da criança, geralmente com a participação dos responsáveis para relatar o histórico."
    - q: "Crianças podem usar florais de Bach?"
      a: "Sim, geralmente diluídos em água, sem o conservante à base de álcool usado na versão padrão para adultos."
    - q: "Gestantes podem fazer homeopatia?"
      a: "Sim, é uma abordagem procurada com frequência durante a gestação. Cada caso é avaliado individualmente, sempre em diálogo com o pré-natal em curso."
    - q: "Gestantes podem usar florais de Bach?"
      a: "Sim, costumam ser bem tolerados. O conservante à base de álcool do preparo padrão pode ser ajustado, se necessário."
    - q: "Animais de estimação podem receber florais de Bach?"
      a: "Sim, são utilizados para apoiar situações que geram estresse perceptível no comportamento do animal, como mudanças de rotina ou ambiente."
    - q: "Idosos podem fazer homeopatia e florais de Bach?"
      a: "Sim, ambas as abordagens são compatíveis com a terceira idade, respeitando o histórico de saúde e os tratamentos médicos já em curso."

- category: "Consulta e atendimento online"
  slug: "consulta"
  items:
    - q: "Como funciona a consulta online?"
      a: "Após o agendamento e o preenchimento de um questionário prévio, a consulta acontece por videochamada no Google Meet, em horário combinado."
    - q: "Preciso instalar algum aplicativo para a consulta?"
      a: "Não. Basta clicar no link do Google Meet enviado antes da consulta, direto pelo navegador."
    - q: "Quanto tempo dura a primeira consulta?"
      a: "Entre 60 e 90 minutos, para uma anamnese completa. Consultas de retorno costumam durar entre 30 e 45 minutos."
    - q: "Preciso preencher algum formulário antes da consulta?"
      a: "Sim, um questionário detalhado enviado após o agendamento, que ajuda a organizar as informações antes do encontro."
    - q: "E se eu me atrasar ou precisar remarcar?"
      a: "Basta avisar pelo WhatsApp com antecedência para reagendarmos, sempre que possível."
    - q: "O atendimento online é tão eficaz quanto o presencial?"
      a: "A avaliação homeopática e floral depende principalmente da conversa detalhada sobre a história da pessoa, o que é plenamente possível por videochamada."

- category: "Pagamento e agendamento"
  slug: "pagamento"
  items:
    - q: "Quanto custa a consulta?"
      a: "O valor varia conforme o tipo de consulta e a abordagem escolhida. Veja a página de valores ou solicite um orçamento pelo WhatsApp."
    - q: "Quais formas de pagamento são aceitas?"
      a: "Pix e cartão, confirmados antes da realização da consulta."
    - q: "Quantas consultas eu vou precisar?"
      a: "Não é possível definir isso antes de conhecer o caso. Em geral, há uma primeira consulta e retornos periódicos, cujo intervalo é combinado conforme a resposta ao tratamento."
    - q: "Como faço para agendar minha primeira consulta?"
      a: "Envie uma mensagem pelo WhatsApp contando brevemente o que te trouxe até aqui, e combinamos um horário disponível."
    - q: "Meus dados e o que conversamos na consulta são confidenciais?"
      a: "Sim, todas as informações compartilhadas são tratadas com sigilo profissional."
